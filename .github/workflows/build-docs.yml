# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch, turns out only master can 
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Build latest docs
      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
      - name: Checkout Main
        uses: actions/checkout@v3
        with:
          ref: main
          clean: false
      - name: Build Main Docs
        run: |
          poetry env use python3.12
          poetry install --with docs
          poetry run mkdocs build -f doc_src/mkdocs.yml -d ../docs/latest

      # Build 0.3.x docs
      - name: Build 0.3.x docs
        run:
          echo "building 0.3.x docs"
      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
      - name: Checkout 0.3.x
        uses: actions/checkout@v3
        with:
          ref: 0.3.x
          clean: false
      - name: Build Docs 0.3.x
        run: |
          rm -f poetry.lock
          poetry env use python3.12
          poetry install --with docs
          poetry run mkdocs build -f doc_src/mkdocs.yml -d ../docs/0.3.x
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
